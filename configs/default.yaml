model:
  vocab_size: 30003
  d_model: 512
  n_layers: 6
  n_heads: 8
  head_dim: 64
  ffn_dim: 2048
  max_seq_len: 512
  weight_tying: true

train:
  learning_rate: 3.0e-4
  warmup_steps: 2000
  total_tokens: 400_000_000
  batch_size: 32
  seq_len: 512
  grad_clip: 1.0
  checkpoint_every: 500
  precision: bf16

tokenizer:
  vocab_size: 30003
  model_type: bpe
  pad_id: 0
  bos_id: 1
  eos_id: 2

data:
  dataset: allenai/c4
  dataset_config: ko
  streaming: true

paths:
  tokenizer_model: tokenizer/tokenizer.model
  checkpoint_dir: checkpoints/
  drive_checkpoint_dir: /content/drive/MyDrive/mygpt/checkpoints/
  log_dir: logs/
